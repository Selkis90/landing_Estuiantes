<!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Imagen con texto - Corfedes</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }
            
            .card-imagen {
                max-width: 800px;
                width: 100%;
                background: white;
                border-radius: 10px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1);
                overflow: hidden;
            }
            
            .contenedor-imagen {
                position: relative;
                width: 100%;
                background: #000;
            }
            
            .contenedor-imagen img {
                width: 100%;
                height: auto;
                display: block;
            }
            
            .textos-superpuestos {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            
            .texto-item {
                position: absolute;
                margin: 0;
                padding: 0;
            }
            
            @media only screen and (max-width: 600px) {
                .texto-item {
                    font-size: calc(100% + 0.5vw);
                    white-space: normal;
                    word-break: break-word;
                }
            }
            
            @media only screen and (max-width: 480px) {
                .contenedor-imagen {
                    width: 100% !important;
                }
            }
        </style>
    </head>
    <body>
        <div class="card-imagen">
            <div class="contenedor-imagen">
                <img src="http://prueba.test/uploads/editor/imagen_1778649185_6a0408614fc16.png" alt="Imagen promocional" style="width:100%; height:auto;">
                <div class="textos-superpuestos"><div class="texto-item" style="color: #000000;font-size: 24px;font-family: Times New Roman;top: 0%;left: 51.242872582268%;transform: translate(-50%, -50%);font-weight: bold;font-style: italic;text-decoration: none;background-color: rgba(255,255,255,0.8);padding: 11px;border-radius: 0px;">encuentra la solucion a tus necesidades</div><div class="texto-item" style="color: #faab00;font-size: 24px;font-family: Arial;top: 20%;left: 10%;transform: translate(-50%, -50%);font-weight: bold;font-style: normal;text-decoration: none;background-color: rgba(255,255,255,0.8);padding: 14px;border-radius: 0px;">necesidad educativa </div><div class="texto-item" style="color: #e71824;font-size: 24px;font-family: Arial;top: 38.80385192126%;left: 0%;transform: translate(-50%, -50%);font-weight: bold;font-style: normal;text-decoration: none;background-color: rgba(255,255,255,0.8);padding: 5px;border-radius: 0px;">Pregrados Especializaciones</div><div class="texto-item" style="color: #e41c22;font-size: 24px;font-family: Verdana;top: 39.919334662351%;left: 72.306674617076%;transform: translate(-50%, -50%);font-weight: bold;font-style: normal;text-decoration: none;background-color: rgba(255,255,255,0.8);padding: 5px;border-radius: 0px;">Maestrias Doctorados</div></div>
            </div>
        </div>
    </body>
    </html>
