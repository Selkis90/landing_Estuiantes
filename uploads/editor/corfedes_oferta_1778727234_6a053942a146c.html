<!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Corfedes - Oferta Educativa</title>
        <style>
            /* Estilos base para todos los clientes */
            .ExternalClass, .ReadMsgBody {
                width: 100%;
                background-color: #f0f2f5;
            }
            body, table, td, p, a {
                -webkit-text-size-adjust: 100%;
                -ms-text-size-adjust: 100%;
            }
            table, td {
                border-collapse: collapse;
                mso-table-lspace: 0pt;
                mso-table-rspace: 0pt;
            }
            img {
                border: 0;
                height: auto;
                line-height: 100%;
                outline: none;
                text-decoration: none;
                -ms-interpolation-mode: bicubic;
            }
            /* Estilos para textos */
            .texto-titulo {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 800;
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
                margin: 0;
                padding: 0;
                line-height: 1.2;
            }
            .texto-porcentaje {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 900;
                color: #f9ca24;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
                margin: 0;
                padding: 0;
            }
            .texto-subtitulo {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 600;
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
                margin: 0;
                padding: 0;
            }
            .texto-lista {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 500;
                color: #ffffff;
                background: rgba(0,0,0,0.6);
                padding: 4px 10px;
                border-radius: 10px;
                margin: 0;
                display: inline-block;
            }
            .texto-url {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 600;
                color: #f9ca24;
                background: rgba(0,0,0,0.5);
                padding: 4px 10px;
                border-radius: 8px;
                text-decoration: none;
                margin: 0;
                display: inline-block;
            }
            .texto-sello {
                font-family: "Montserrat", "Open Sans", Arial, sans-serif;
                font-weight: 800;
                color: #ffffff;
                background: linear-gradient(135deg, #2ed573 0%, #0abde3 100%);
                padding: 3px 10px;
                border-radius: 20px;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin: 0;
                display: inline-block;
            }
            /* Responsive */
            @media only screen and (max-width: 600px) {
                .texto-titulo { font-size: 14px !important; }
                .texto-porcentaje { font-size: 22px !important; }
                .texto-subtitulo { font-size: 11px !important; }
                .texto-lista { font-size: 8px !important; padding: 3px 6px; }
                .texto-url { font-size: 8px !important; }
                .texto-sello { font-size: 7px !important; padding: 2px 6px; }
                .contenedor-imagen { width: 100% !important; }
            }
        </style>
